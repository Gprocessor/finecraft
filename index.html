<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FinCraft — Apache Fineract Platform</title>
  <meta name="description" content="FinCraft: a modern web UI for Apache Fineract microfinance platform"/>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg"/>
  <!-- Font Awesome 6 (CDN) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link rel="stylesheet" href="./css/app.css"/>
  <!-- SPA redirect for GitHub Pages (generated by _redirects handling) -->
  <script>
    // Handle GitHub Pages 404 redirect for SPA routing
    const redirect = sessionStorage.getItem('_spa_redirect');
    if (redirect) { sessionStorage.removeItem('_spa_redirect'); window.history.replaceState(null, '', redirect); }
  </script>
</head>
<body>
  <!-- Login screen (shown before auth) -->
  <div id="loginScreen"></div>

  <!-- App shell (hidden until authenticated) -->
  <div id="appShell" hidden></div>

  <!-- Modal container -->
  <div id="modalRoot"></div>

  <!-- Toast container -->
  <div id="toastContainer" aria-live="assertive"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
